name: Build macOS Installer

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to build"
        required: false
        default: "master"
  push:
    branches:
      - master
    paths:
      - "src/**"
      - "libs/**"
      - "flutter/**"
      - "build.py"
      - ".github/workflows/macos-build.yml"

permissions:
  contents: read

jobs:
  build-macos:
    runs-on: macos-14
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          submodules: false

      - name: Resolve hbb_common dependency
        run: |
          set -euxo pipefail
          if ! git submodule update --init --depth=1 libs/hbb_common; then
            echo "Submodule commit is unavailable; fallback to latest hbb_common."
            rm -rf libs/hbb_common
            git clone --depth=1 https://github.com/rustdesk/hbb_common libs/hbb_common
          fi

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Flutter dependencies
        run: |
          cd flutter
          flutter pub get

      # libyuv is not reliably available via Homebrew; RustDesk ships prebuilt Cellar trees (libyuv, etc.) in mac_deps.tar.gz.
      # magnum-opus expects opus. create-dmg packages the app at the end.
      - name: Install Rust native dependencies (Homebrew)
        run: |
          set -euxo pipefail
          brew update
          brew install \
            ninja \
            create-dmg \
            opus \
            aom \
            libvpx

      - name: Download and install macOS dependencies
        run: |
          set -euxo pipefail
          brew install pkg-config cmake
          curl -fL -o mac_deps.tar.gz \
            https://github.com/rustdesk/doc.rustdesk.com/releases/download/console/mac_deps.tar.gz
          tar xzf mac_deps.tar.gz
          sudo cp -r mac_deps/* /opt/homebrew/Cellar/

      - name: Build macOS release
        run: python3 build.py --flutter

      - name: Create DMG installer
        run: |
          VERSION=$(python3 -c "import re; print(re.search(r'^version\\s*=\\s*\"([^\"]+)\"', open('Cargo.toml', encoding='utf-8').read(), re.M).group(1))")
          APP_PATH=$(ls -d flutter/build/macos/Build/Products/Release/*.app | head -n 1)
          APP_NAME=$(basename "$APP_PATH")
          create-dmg \
            --icon "$APP_NAME" 200 190 \
            --hide-extension "$APP_NAME" \
            --window-size 800 400 \
            --app-drop-link 600 185 \
            "SeeDesktop-${VERSION}-macOS.dmg" \
            "$APP_PATH"

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: |
            SeeDesktop-*-macOS.dmg
            flutter/build/macos/Build/Products/Release/*.app
          if-no-files-found: error
