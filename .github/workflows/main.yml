name: Manual Windows Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    env:
      VCPKG_ROOT: C:\vcpkg
      VCPKG_DEFAULT_TRIPLET: x64-windows-static

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Apply Custom Branding
        shell: pwsh
        run: |
          Write-Host "Starting rebranding process..."
          New-Item -ItemType Directory -Force -Path ".\flutter\windows\runner\resources"
          New-Item -ItemType Directory -Force -Path ".\flutter\assets\images"
          New-Item -ItemType Directory -Force -Path ".\flutter\assets"
          
          # וידוא קיום תיקיית המיתוג
          if (Test-Path ".\custom_branding") {
            Copy-Item -Path ".\custom_branding\app_icon.ico" -Destination ".\flutter\windows\runner\resources\app_icon.ico" -Force
            Copy-Item -Path ".\custom_branding\logo.png" -Destination ".\flutter\assets\logo.png" -Force
            Copy-Item -Path ".\custom_branding\logo.png" -Destination ".\flutter\assets\images\logo.png" -Force
          }

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Hardcode Server and Key
        shell: python
        run: |
          import glob, re
          files = glob.glob('libs/hbb_common/src/**/*.rs', recursive=True)
          for f in files:
              with open(f, 'r', encoding='utf-8') as file:
                  content = file.read()
              if 'pub const RENDEZVOUS_SERVER' in content or 'pub const RS_PUB_KEY' in content:
                  content = re.sub(r'pub const RENDEZVOUS_SERVER:[^;]+;', 'pub const RENDEZVOUS_SERVER: &\'static str = "187.124.13.191";', content)
                  content = re.sub(r'pub const RS_PUB_KEY:[^;]+;', 'pub const RS_PUB_KEY: &\'static str = "F0QrJCreHax0mBClNCQ6BUC3G+Nq8IxF7WoGr1imGJc=";', content)
                  with open(f, 'w', encoding='utf-8') as file:
                      file.write(content)

      - name: Setup vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg $env:VCPKG_ROOT
          & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat"
          & "$env:VCPKG_ROOT\vcpkg.exe" install --triplet x64-windows-static

      - name: Install FRB codegen
        run: cargo install flutter_rust_bridge_codegen --version 1.80.1 --features uuid --locked

      - name: Build with Flutter
        shell: pwsh
        run: python build.py --flutter

      - name: Prepare Standalone Bundle
        shell: pwsh
        run: |
          # 1. מציאת תיקיית ה-Release של פלאטר
          $buildDir = "flutter/build/windows/runner/Release"
          $outDir = "dist"
          New-Item -ItemType Directory -Force -Path $outDir
          
          # 2. שינוי שם ה-EXE הראשי
          Rename-Item -Path "$buildDir/rustdesk.exe" -NewName "See-Desktop.exe" -Force
          
          # 3. התקנת Enigma Virtual Box לצורך איחוד קבצים
          choco install enigmavirtualbox -y
          
          # 4. יצירת קובץ פרויקט לאיחוד (ביצוע Bundle לכל ה-DLLים לתוך ה-EXE)
          # אנחנו פשוט נעתיק את התיקייה כרגע כגיבוי, אבל נכין אותה לאריזה
          Move-Item -Path "$buildDir/*" -Destination "$outDir/" -Force

      - name: Upload Single Executable
        uses: actions/upload-artifact@v4
        with:
          name: See-Desktop-Windows-Standalone
          path: dist/ # בשלב זה זה עדיין תיקייה, אבל מסודרת.
