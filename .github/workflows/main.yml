name: Manual Windows Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    env:
      VCPKG_ROOT: ${{ github.workspace }}\vcpkg
      VCPKG_DEFAULT_TRIPLET: x64-windows-static
      VCPKG_COMMIT_ID: 120deac3062162151622ca4860575a33844ba10b

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Apply Custom Branding
        shell: pwsh
        run: |
          Write-Host "Starting rebranding process..."
          New-Item -ItemType Directory -Force -Path ".\flutter\windows\runner\resources"
          New-Item -ItemType Directory -Force -Path ".\flutter\assets\images"
          New-Item -ItemType Directory -Force -Path ".\flutter\assets"
          New-Item -ItemType Directory -Force -Path ".\res"
          
          if (Test-Path ".\custom_branding") {
            Copy-Item -Path ".\custom_branding\app_icon.ico" -Destination ".\flutter\windows\runner\resources\app_icon.ico" -Force
            Copy-Item -Path ".\custom_branding\app_icon.ico" -Destination ".\flutter\assets\icon.ico" -Force
            Copy-Item -Path ".\custom_branding\app_icon.ico" -Destination ".\res\icon.ico" -Force
            if (Test-Path ".\custom_branding\new_tray.ico") {
              Copy-Item -Path ".\custom_branding\new_tray.ico" -Destination ".\flutter\assets\new_tray.ico" -Force
              Copy-Item -Path ".\custom_branding\new_tray.ico" -Destination ".\flutter\assets\see-desktop-tray.ico" -Force
              Copy-Item -Path ".\custom_branding\new_tray.ico" -Destination ".\res\new_tray.ico" -Force
            }
            Copy-Item -Path ".\custom_branding\logo.png" -Destination ".\flutter\assets\logo.png" -Force
            Copy-Item -Path ".\custom_branding\logo.png" -Destination ".\flutter\assets\images\logo.png" -Force
            Copy-Item -Path ".\custom_branding\rustdesk.png" -Destination ".\flutter\assets\rustdesk.png" -Force
            Copy-Item -Path ".\custom_branding\rustdesk.png" -Destination ".\flutter\assets\images\rustdesk.png" -Force
          }

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Hardcode Server and Key
        shell: python
        run: |
          import glob, re
          files = glob.glob('libs/hbb_common/src/**/*.rs', recursive=True)
          for f in files:
              with open(f, 'r', encoding='utf-8') as file:
                  content = file.read()
              
              if 'pub const RENDEZVOUS_SERVER' in content or 'pub const RS_PUB_KEY' in content:
                  content = re.sub(r'pub const RENDEZVOUS_SERVER:[^;]+;', 'pub const RENDEZVOUS_SERVER: &\'static str = "187.124.13.191";', content)
                  content = re.sub(r'pub const RS_PUB_KEY:[^;]+;', 'pub const RS_PUB_KEY: &\'static str = "F0QrJCreHax0mBClNCQ6BUC3G+Nq8IxF7WoGr1imGJc=";', content)
                  
                  with open(f, 'w', encoding='utf-8') as file:
                      file.write(content)

      - name: Setup vcpkg with GitHub Actions cache
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: ${{ github.workspace }}/vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        shell: pwsh
        run: |
          $vcpkgExe = Join-Path $env:VCPKG_ROOT "vcpkg.exe"
          if (-not (Test-Path $vcpkgExe)) {
            Write-Error "vcpkg.exe not found at $vcpkgExe"
            exit 1
          }

          # Retry install to tolerate transient network hiccups.
          $maxRetries = 3
          for ($attempt = 1; $attempt -le $maxRetries; $attempt++) {
            & $vcpkgExe install --triplet x64-windows-static --x-install-root="$env:VCPKG_ROOT\installed"
            if ($LASTEXITCODE -eq 0) { break }
            if ($attempt -eq $maxRetries) {
              Write-Error "vcpkg install failed after $maxRetries attempts."
              exit $LASTEXITCODE
            }
            Write-Host "vcpkg install failed (attempt $attempt). Retrying in 15s..."
            Start-Sleep -Seconds 15
          }

      - name: Install FRB codegen
        run: cargo install flutter_rust_bridge_codegen --version 1.80.1 --features uuid --locked

      - name: Prepare Flutter packages
        shell: pwsh
        working-directory: ./flutter
        run: flutter pub get

      - name: Generate bridge files
        shell: pwsh
        run: |
          flutter_rust_bridge_codegen --rust-input ./src/flutter_ffi.rs --dart-output ./flutter/lib/generated_bridge.dart --c-output ./flutter/macos/Runner/bridge_generated.h
          Copy-Item "flutter/macos/Runner/bridge_generated.h" "flutter/ios/Runner/bridge_generated.h" -Force

      - name: Build with Flutter
        shell: pwsh
        run: python build.py --flutter

      - name: Prepare Standalone Bundle
        shell: pwsh
        run: |
          $outDir = "dist"
          New-Item -ItemType Directory -Force -Path $outDir
          
          $exeFile = Get-ChildItem -Path flutter/build/windows -Filter "rustdesk.exe" -Recurse | Select-Object -First 1
          
          if ($exeFile) {
              $buildDir = Split-Path $exeFile.FullName
              Write-Host "Found executable in: $buildDir"
              
              Rename-Item -Path $exeFile.FullName -NewName "SeeDesktop.exe" -Force
              Move-Item -Path "$buildDir/*" -Destination "$outDir/" -Force
          } else {
              Write-Error "Could not find rustdesk.exe! The build might have failed silently."
              exit 1
          }

      - name: Upload Single Executable
        uses: actions/upload-artifact@v4
        with:
          name: SeeDesktop-Windows-Standalone
          path: dist/
